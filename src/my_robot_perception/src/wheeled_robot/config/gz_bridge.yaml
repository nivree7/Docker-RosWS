ros_gz_bridge:
  parameter_bridge:
    bridges:
      clock:
        topic_name: "/clock"
        ros_type_name: "rosgraph_msgs/msg/Clock"
        gz_type_name: "gz.msgs.Clock"
        direction: GZ_TO_ROS
        gz_topic_name: "/clock"

      joint_states:
        topic_name: "/joint_states"
        ros_type_name: "sensor_msgs/msg/JointState"
        gz_type_name: "gz.msgs.JointState"
        direction: GZ_TO_ROS
        gz_topic_name: "/model/differential_drive_robot/joint_state"

      odom:
        topic_name: "/odom"
        ros_type_name: "nav_msgs/msg/Odometry"
        gz_type_name: "gz.msgs.Odometry"
        direction: GZ_TO_ROS
        gz_topic_name: "/model/differential_drive_robot/odometry"

      tf:
        topic_name: "/tf"
        ros_type_name: "tf2_msgs/msg/TFMessage"
        gz_type_name: "gz.msgs.Pose_V"
        direction: GZ_TO_ROS
        gz_topic_name: "/model/differential_drive_robot/pose"

      cmd_vel:
        topic_name: "/cmd_vel"
        ros_type_name: "geometry_msgs/msg/Twist"
        gz_type_name: "gz.msgs.Twist"
        direction: ROS_TO_GZ
        gz_topic_name: "/model/differential_drive_robot/cmd_vel"
