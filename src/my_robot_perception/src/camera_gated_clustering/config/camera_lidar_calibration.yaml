camera_lidar_transform:
  # Placeholder Camera-LiDAR Calibration
  # ⚠️ UPDATE THESE VALUES WHEN HARDWARE IS MOUNTED ⚠️
  # The transformation goes from LiDAR frame to camera frame.

  translation:
    x: 0.0  # Camera forward offset from LiDAR (meters)
    y: 0.0  # Camera lateral offset from LiDAR (meters)
    z: 0.1  # Camera vertical offset from LiDAR (meters)

  rotation:
    roll: 0.0   # Rotation around x-axis (radians)
    pitch: 0.0  # Rotation around y-axis (radians)
    yaw: 0.0    # Rotation around z-axis (radians)

  parent_frame: "os_sensor"      # Ouster LiDAR frame
  child_frame: "zed_camera_link" # ZED base frame (connects to optical frames)

# Calibration Notes:
# 1. These are PLACEHOLDER values for development
# 2. Update this file after hardware is mounted
# 3. Restart the launch file after edits

# Example values:
# - Camera directly above LiDAR:
#   translation: {x: 0.0, y: 0.0, z: 0.15}
# - Camera 10cm forward and 5cm above:
#   translation: {x: 0.10, y: 0.0, z: 0.05}
# - Camera tilted down 10 degrees:
#   rotation: {roll: 0.0, pitch: -0.174, yaw: 0.0}
