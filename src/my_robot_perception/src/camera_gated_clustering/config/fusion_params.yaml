/**:
  ros__parameters:
    # === GATING CONFIGURATION ===
    gating:
      mode: "soft"
      enabled: true

    # === ASSOCIATION PARAMETERS ===
    association:
      method: "hybrid"
      iou_threshold: 0.25
      max_centroid_distance_px: 100
      max_spatial_distance_m: 2.5
      weight_iou: 0.4
      weight_centroid: 0.3
      weight_spatial: 0.3
      min_hybrid_score: 0.5

    # === CONFIDENCE PARAMETERS ===
    confidence:
      min_camera_confidence: 0.45
      min_lidar_confidence: 0.35
      camera_weight: 0.6
      lidar_weight: 0.4
      min_cluster_points: 30
      max_cluster_points: 15000

    # === CLUSTERING PARAMETERS ===
    clustering:
      enabled: true
      method: "dbscan"  # options: euclidean, dbscan
      cluster_tolerance_m: 0.225
      min_cluster_size: 20
      max_cluster_size: 50

      dbscan_eps_m: 0.30
      dbscan_min_samples: 10

      use_external: true
      external_topic: "/fusion/lidar_clusters"
      marker_topic: "/fusion/lidar_markers"
      marker_lifetime_sec: 0.2

      roi_min: [-3.0, -3.0, -2.0]
      roi_max: [3.0, 3.0, 2.0]

      ground_filter_enabled: true
      ground_z_min: -1.85
      ground_z_max: 0.5

      voxel_leaf_size: 0.3

    # === FRAMES ===
    frames:
      base_frame: "base_link"
      lidar_frame: "os_sensor"
      camera_frame: "zed_camera_center"
      camera_optical_frame: "zed_left_camera_optical_frame"

    # === TOPICS ===
    topics:
      # Input topics
      lidar_points: "/ouster/points"
      camera_image: "/zed/zed_node/left/image_rect_color"
      camera_depth: "/zed/zed_node/depth/depth_registered"
      camera_info: "/zed/zed_node/left/camera_info"
      camera_objects: "/zed/zed_node/obj_det/objects"
      detections3d_in: "/lidar/detections3d"

      # Output topics
      enriched_clusters: "/fusion/enriched_clusters"
      filtered_cloud: "/fusion/filtered_cloud"
      visualization_markers: "/fusion/markers"
      debug_image: "/fusion/debug_image"
      association_debug: "/fusion/association_debug"
      fused_detections3d: "/fusion/detections3d"

    # === SYNCHRONIZATION ===
    sync:
      queue_size: 10
      max_time_difference_ms: 100

    # === PROJECTION ===
    projection:
      min_depth_m: 0.5
      max_depth_m: 25.0
      image_margin_px: 20

    # === CLASSIFIER ===
    classifier:
      area_threshold_px: 4500
      min_roi_area_px: 900
      unknown_score: 0.2
      vehicle_score: 0.7
      person_score: 0.6

    # === FUSION GATING ===
    gating_fusion:
      drop_if_no_projection: false
      fallback_publish_unmodified: true

    # === VISUALIZATION ===
    visualization:
      publish_debug_image: true
      publish_markers: true
      marker_lifetime_sec: 0.2
      color_fused: [0.0, 0.8, 1.0]

    # === PERFORMANCE ===
    performance:
      enable_profiling: true
      log_processing_time: false
      max_processing_time_ms: 80

    runtime_check:
      enabled: true
      warn_period_sec: 5.0
