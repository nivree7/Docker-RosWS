lidar_perception_node:
  ros__parameters:
    frames:
      lidar_frame: os_sensor
      output_frame: base_link

    topics:
      pointcloud_in: /ouster/points
      detections3d_out: /lidar/detections3d

    clustering:
      enabled: true
      algorithm: euclidean
      cluster_tolerance_m: 0.115
      min_cluster_size: 120
      max_cluster_size: 2000

    ground_filter:
      enabled: false
      min_z_m: -0.3
      max_z_m: 0.2

    postprocessing:
      min_distance_m: 0.5
      max_distance_m: 60.0
      min_height_m: -1.5
      max_height_m: 10.0
      min_bbox_x_m: 0.15
      max_bbox_x_m: 0.7
      min_bbox_y_m: 0.15
      max_bbox_y_m: 0.7
      min_bbox_z_m: -1.5
      max_bbox_z_m: 1.3
      confidence_scale: 1000.0

    output:
      publish_debug_cloud: true
      debug_cloud_topic: /lidar/debug_cloud
      publish_markers: true
      markers_topic: /lidar/cluster_markers
