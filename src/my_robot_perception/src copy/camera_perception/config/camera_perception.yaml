# Camera perception node configuration.
# All topics/frames/msg names that may be shared across the stack
# are exposed here so fusion can depend on a stable API.

camera_perception_node:
  ros__parameters:
    frames:
      camera_frame: zed_left_camera_optical_frame

    topics:
      camera_image: /zed/zed_node/left/image_rect_color
      depth_image: /zed/zed_node/depth/depth_registered
      camera_info: /zed/zed_node/left/camera_info
      detections3d_out: /camera/detections3d
      debug_image_out: /camera/debug_image
      markers_out: /camera/detections_markers

    # Detector backend configuration (YOLOv8 for road hazard detection)
    detector:
      enabled: true
      backend: yolov8
      model_name: yolov8_road_hazards.pt
      confidence_threshold: 0.45
      iou_threshold: 0.45
      # device: '0' uses the Jetson Orin GPU (requires NVIDIA L4T PyTorch wheel).
      # Change to 'cpu' if using the standard PyPI torch 2.8.0+cpu wheel.
      device: '0'
      img_size: 640      # must match training imgsz (model was trained at 640)
      max_det: 50
      frame_skip: 1      # process every frame; increase to 2 if CPU inference is used

    depth:
      min_depth_m: 0.5
      max_depth_m: 12.0   # ZED original stereo reliable to ~12 m
      min_valid_fraction: 0.10
      depth_roi_shrink: 0.8

    bbox3d:
      depth_estimate_method: std   # 'std' or 'fixed'
      fixed_depth_extent_m: 0.5

    output:
      publish_debug_image: true
      label_font_scale: 0.7
      label_thickness: 2
